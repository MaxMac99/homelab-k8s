name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prettier:
    name: Prettier
    runs-on: homelab-runner
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable && yarn install --frozen-lockfile

      - run: yarn prettier --check .
