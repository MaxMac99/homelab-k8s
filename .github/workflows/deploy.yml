name: Pulumi Deploy

on:
  push:
    branches: [main]

concurrency:
  group: pulumi-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    name: Pulumi Deploy
    runs-on: homelab-runner
    steps:
      - name: Cancel running previews
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in $(gh run list -w "Pulumi Preview" --json databaseId,status -q '.[] | select(.status == "in_progress" or .status == "queued") | .databaseId'); do
            gh run cancel "$id" || true
          done

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: corepack enable && yarn install --frozen-lockfile

      - name: Generate kubeconfig
        run: |
          mkdir -p ~/.kube
          cat <<EOF > ~/.kube/k3s-config
          apiVersion: v1
          kind: Config
          clusters:
            - cluster:
                server: https://kubernetes.default.svc
                certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              name: default
          contexts:
            - context:
                cluster: default
                user: default
              name: default
          current-context: default
          users:
            - name: default
              user:
                tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          EOF

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: default
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}